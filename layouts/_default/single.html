{{ define "main" }}
<div class="container">
<a class="backlink" href="/">&larr; Back to Museum</a>
<article class="prose">
<h1>{{ .Title }}</h1>
{{ with .Params.meta }}<div class="meta">{{ . }}</div>{{ end }}
{{ with .Params.live_url }}
<a class="launch-site" href="{{ . }}" target="_blank" rel="noopener"
   style="display:inline-block;margin:14px 0 4px;padding:11px 20px;background:#810303;color:#fff;border-radius:9px;text-decoration:none;font-weight:bold;box-shadow:0 2px 6px rgba(0,0,0,.25)">&#9654;&nbsp; Open the rebuilt site</a>
{{ end }}
{{ .Content }}
</article>
</div>
{{ end }}
