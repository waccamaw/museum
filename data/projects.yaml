# Drives the homepage timeline. A card with `url` is clickable; without `url` it's
# a non-clickable archive/placeholder card. `shot` points to assets/shots/<name>.png.
# Every incarnation is now self-hosted under /sites/<slug>/ (cloned from the Internet
# Archive + the tribe's own 2012 backup); only the live site links off-site.
eras:
  - label: "2004 – 2008 · The tribe's first website (waccamaw.us)"
    projects:
      - title: "waccamaw.us (2004)"
        meta: "Self-hosted clone · the tribe's first website"
        desc: "Years before the tribe held waccamaw.org, the Waccamaw Indian People ran their own site at waccamaw.us — a hand-coded frameset, 'Waccamaw Indian People Tribal Website,' with Home, News Letters, Forums, About, and Contact."
        url: "/sites/waccamaw-us-2004/"
        shot: "wac-us-2004"
        tags: [{label: "self-hosted", class: "local"}]
      - title: "waccamaw.us — welcome (c. 2008)"
        meta: "Self-hosted clone · 2005–2011"
        desc: "The 'Official Tribal Web Site' welcome page — the Waccamaw River at Conway, an ENTER button between two ceremonial staffs, and the words 'Walk easy on Mother Earth.'"
        url: "/sites/waccamaw-us-2008/"
        shot: "wac-us-2008"
        tags: [{label: "self-hosted", class: "local"}, {label: "see exhibit", class: "source"}]

  - label: "2009 – 2014 · The WordPress years (waccamawindians.us)"
    projects:
      - title: "waccamawindians.us (2011)"
        meta: "Rebuilt from the original theme · the tribe's WordPress site"
        desc: "The tribe's first content-managed site — WordPress, at waccamawindians.us (the waccamaw.us 'ENTER' splash fed into it). Black background, dreamcatcher logo, a red-bordered sidebar menu, and 'Walk easy on Mother Earth' in white. Rebuilt here from the original theme files recovered from the 2012 backup. This site was later compromised and taken down."
        url: "/sites/waccamawindians-us-2011/"
        shot: "wac-windians-us-2010"
        tags: [{label: "rebuilt site", class: "local"}, {label: "see exhibit", class: "source"}]

  - label: "2013 – 2016 · waccamaw.org, won by arbitration"
    projects:
      - title: "waccamaw.org (2013)"
        meta: "Self-hosted clone · 2013"
        desc: "The Waccamaw Indian People's own site (WordPress) after the tribe won the domain — 'UPDATE: We won!' — featuring Tribal Events, the Governing Body, and the photography of tribal members including Terry Hatcher. Rebuilt from the original theme."
        url: "/sites/waccamaw-org-2013/"
        shot: "wac-2013"
        tags: [{label: "self-hosted", class: "local"}]
      - title: "waccamaw.org (2016)"
        meta: "Self-hosted clone · 2016"
        desc: "The tribal site as it stood mid-decade."
        url: "/sites/waccamaw-org-2016/"
        shot: "wac-2016"
        tags: [{label: "self-hosted", class: "local"}]

  - label: "2019 – 2024 · Modern era"
    projects:
      - title: "waccamaw.org (2020)"
        meta: "Self-hosted clone · 2020"
        desc: "A modern, rebuilt tribal site — WACCAMAW PRIDE — with sections on the People's history, government, and community."
        url: "/sites/waccamaw-org-2020/"
        shot: "wac-2020"
        tags: [{label: "self-hosted", class: "local"}]
      - title: "waccamaw.org (2023)"
        meta: "Self-hosted clone · 2023"
        desc: "The tribal site in the early 2020s."
        url: "/sites/waccamaw-org-2023/"
        shot: "wac-2023"
        tags: [{label: "self-hosted", class: "local"}]

  - label: "2025 – present · Today"
    projects:
      - title: "waccamaw.org (live)"
        meta: "Current site"
        desc: "The Waccamaw Indian People's website as it stands today."
        url: "https://waccamaw.org/"
        shot: "wac-live"
        tags: [{label: "live site", class: "source"}]

  - label: "Exhibits · In research"
    projects:
      - title: "The Waccamaw Indian People"
        meta: "History &amp; community · being assembled"
        desc: "An exhibit on the People — our history, recognition, gatherings, and community — drawn from the tribe's own records."
        url: "/exhibits/waccamaw-people/"
        tags: [{label: "exhibit", class: "source"}]
      - title: "Chief Hatcher"
        meta: "Tribal leadership · being assembled"
        desc: "An exhibit honoring Chief Hatcher and the leadership of the Waccamaw Indian People."
        url: "/exhibits/chief-hatcher/"
        tags: [{label: "exhibit", class: "source"}]
      - title: "The tribe's first website"
        meta: "waccamaw.us · 2004–2011"
        desc: "The story of the tribe's first home on the web — hand-coded in 2004, the 'Walk easy on Mother Earth' welcome page through the late 2000s, then rebuilt in WordPress before it was hacked and taken down."
        url: "/exhibits/waccamaw-us/"
        tags: [{label: "exhibit", class: "source"}]
