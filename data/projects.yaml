# Drives the homepage timeline. A card with `url` is clickable; without `url` it's
# a non-clickable archive/placeholder card. `shot` points to assets/shots/<name>.png.
# Incarnation cards currently link to the Internet Archive snapshot; local hosted
# snapshots will replace them as they are captured.
eras:
  - label: "2001 – 2002 · The first website"
    projects:
      - title: "waccamaw.org (2001)"
        meta: "Internet Archive · earliest capture"
        desc: "The earliest archived version of waccamaw.org. At this time the domain belonged to the Waccamaw Community Foundation, a separate charitable organization — the Waccamaw Indian People acquired the domain later, by arbitration."
        url: "https://web.archive.org/web/20010730035959/http://www.waccamaw.org/"
        shot: "wac-2001"
        tags: [{label: "Wayback snapshot", class: "wayback"}]
      - title: "waccamaw.org (2002)"
        meta: "Internet Archive · 2002"
        desc: "The site in 2002, still operated by the Waccamaw Community Foundation before the domain passed to the tribe."
        url: "https://web.archive.org/web/20020402132818/http://www.waccamaw.org/"
        shot: "wac-2002"
        tags: [{label: "Wayback snapshot", class: "wayback"}]

  - label: "2008 – 2010 · Mid-era"
    projects:
      - title: "waccamaw.org (mid-era, 2003)"
        meta: "Local archive + Internet Archive"
        desc: "No tribal homepage was archived between 2004 and 2012 (the domain only redirected during those years). This 2003 capture — the last full Waccamaw Community Foundation homepage before the domain changed hands — stands in for the mid-era. Mirrored in the local archive."
        url: "https://web.archive.org/web/20030220135431/http://waccamaw.org/"
        shot: "wac-2008"
        tags: [{label: "Wayback snapshot", class: "wayback"}, {label: "local mirror", class: "local"}]

  - label: "2011 – 2016 · Redesign era"
    projects:
      - title: "waccamaw.org (2013)"
        meta: "Internet Archive · 2013"
        desc: "The Waccamaw Indian People's own site (WordPress) after the tribe won the domain — featuring Tribal Events, the Governing Body, and the photography of tribal members including Terry Hatcher."
        url: "https://web.archive.org/web/20130718064343/http://waccamaw.org/"
        shot: "wac-2013"
        tags: [{label: "Wayback snapshot", class: "wayback"}]
      - title: "waccamaw.org (2016)"
        meta: "Internet Archive · 2016"
        desc: "The tribal site as it stood mid-decade."
        url: "https://web.archive.org/web/20160809022209/http://waccamaw.org/"
        shot: "wac-2016"
        tags: [{label: "Wayback snapshot", class: "wayback"}]

  - label: "2019 – 2024 · Modern era"
    projects:
      - title: "waccamaw.org (2020)"
        meta: "Internet Archive · 2020"
        desc: "A modern, rebuilt tribal site — WACCAMAW PRIDE — with sections on the People's history, government, and community."
        url: "https://web.archive.org/web/20200805212740/https://www.waccamaw.org/"
        shot: "wac-2020"
        tags: [{label: "Wayback snapshot", class: "wayback"}]
      - title: "waccamaw.org (2023)"
        meta: "Internet Archive · 2023"
        desc: "The tribal site in the early 2020s."
        url: "https://web.archive.org/web/20230107200840/https://www.waccamaw.org/"
        shot: "wac-2023"
        tags: [{label: "Wayback snapshot", class: "wayback"}]

  - label: "2025 – present · Today"
    projects:
      - title: "waccamaw.org (live)"
        meta: "Current site"
        desc: "The Waccamaw Indian People's website as it stands today."
        url: "https://waccamaw.org/"
        shot: "wac-live"
        tags: [{label: "live site", class: "source"}]

  - label: "Exhibits · In research"
    projects:
      - title: "The Waccamaw Indian People"
        meta: "History &amp; community · being assembled"
        desc: "An exhibit on the People — our history, recognition, gatherings, and community — drawn from the tribe's own records."
        url: "/exhibits/waccamaw-people/"
        tags: [{label: "exhibit", class: "source"}]
      - title: "Chief Hatcher"
        meta: "Tribal leadership · being assembled"
        desc: "An exhibit honoring Chief Hatcher and the leadership of the Waccamaw Indian People."
        url: "/exhibits/chief-hatcher/"
        tags: [{label: "exhibit", class: "source"}]
